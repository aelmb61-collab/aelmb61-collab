<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url='https://aelmb61-collab.github.io/'" />
    <title>Moving to SmartTools Hub</title>
    <style>
        body {
            background-color: #0f172a; /* Dark Blue like Kali/Linux */
            color: #38bdf8; /* Light Blue text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #38bdf8;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #94a3b8; }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Made by Abenezer | Girma</h1>
        <p>Transferring you to SmartTools Hub...</p>
        <div class="loader"></div>
        <p style="font-size: 0.9rem;">Click <a href="https://aelmb61-collab.github.io/" style="color: #38bdf8;">here</a> if you aren't redirected.</p>
    </div>
</body>
</html>
